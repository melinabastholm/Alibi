<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Campus Courtyard</title>
  <desc id="desc">Flat campus illustration with simple text labels.</desc>
  <rect width="1600" height="900" fill="#1e3354"/>
  <rect y="540" width="1600" height="360" fill="#34586e"/>
  <rect x="80" y="240" width="360" height="360" rx="18" fill="#5c87a3"/>
  <rect x="500" y="180" width="460" height="420" rx="22" fill="#6b9ab6"/>
  <rect x="1030" y="260" width="500" height="340" rx="18" fill="#88a9be"/>
  <rect x="0" y="620" width="1600" height="280" fill="#253642"/>
  <circle cx="1290" cy="170" r="74" fill="#f5d490"/>
  <text x="800" y="112" font-size="64" text-anchor="middle" fill="#f8f3ea" font-family="Trebuchet MS, sans-serif">CAMPUS</text>
  <text x="260" y="450" font-size="40" text-anchor="middle" fill="#f8f3ea" font-family="Trebuchet MS, sans-serif">LIBRARY</text>
  <text x="730" y="410" font-size="40" text-anchor="middle" fill="#f8f3ea" font-family="Trebuchet MS, sans-serif">HALL</text>
  <text x="1280" y="450" font-size="40" text-anchor="middle" fill="#20303a" font-family="Trebuchet MS, sans-serif">LAB</text>
</svg>
