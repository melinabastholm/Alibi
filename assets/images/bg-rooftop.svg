<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Rooftop Antenna</title>
  <desc id="desc">Flat rooftop illustration with simple text labels.</desc>
  <rect width="1600" height="900" fill="#3b5c73"/>
  <rect y="610" width="1600" height="290" fill="#1c2731"/>
  <rect x="0" y="540" width="1600" height="80" fill="#4f748d"/>
  <rect x="1090" y="210" width="130" height="410" fill="#d8e6ee"/>
  <rect x="1060" y="170" width="190" height="46" rx="12" fill="#efb159"/>
  <line x1="1155" y1="170" x2="1000" y2="90" stroke="#d8e6ee" stroke-width="12"/>
  <line x1="1155" y1="170" x2="1310" y2="90" stroke="#d8e6ee" stroke-width="12"/>
